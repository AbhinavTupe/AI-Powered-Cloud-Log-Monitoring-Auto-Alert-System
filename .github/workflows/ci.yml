name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t cloud-log-monitoring:ci .

      - name: Validate deployment container starts
        run: |
          docker run -d --name monitoring-ci -p 5000:5000 cloud-log-monitoring:ci
          sleep 8
          curl --fail http://localhost:5000/health
          docker stop monitoring-ci

