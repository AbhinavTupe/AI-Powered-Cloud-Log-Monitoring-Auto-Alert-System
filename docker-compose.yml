services:
  monitoring-api:
    build: .
    container_name: cloud-log-monitoring-api
    ports:
      - "5000:5000"
    env_file:
      - .env.example
    environment:
      DATABASE_PATH: /app/instance/monitoring.db
    volumes:
      - monitoring-data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  monitoring-data:

